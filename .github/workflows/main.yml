name: CI

on:
  pull_request:
    branches: [master]

  workflow_dispatch:

jobs:
  Test:
    name: Run Test with Python
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          python-version: lastest
      - run: python -V
      - run: python -m pip install -r requirments_dev.txt
      - run: pytest
